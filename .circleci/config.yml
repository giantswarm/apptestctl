version: 2.1

orbs:
  architect: giantswarm/architect@9.5.2

workflows:
  test:
    jobs:
    - architect/go-build:
        context: architect
        name: go-build-apptestctl
        binary: apptestctl
        architectures: "linux/amd64,linux/arm64,darwin/amd64,darwin/arm64,windows/amd64,windows/arm64"
        filters:
            # Trigger job also on git tag.
          tags:
            only: /^v.*/

    - architect/push-to-registries:
        context: architect
        name: push-to-registries
        platforms: "linux/amd64,linux/arm64"
        requires:
        - go-build-apptestctl
        filters:
            # Needed to trigger job also on git tag.
          tags:
            only: /^v.*/

          branches:
            ignore:
            - main
            - master

    - architect/upload-release-assets:
        context: architect
        name: upload-release-assets
        binary: apptestctl
        requires:
        - go-build-apptestctl
        filters:
          tags:
            only: /^v.*/
          branches:
            ignore: /.*/

    - architect/integration-test:
        context: architect
        name: integration-test-bootstrap
        setup-script: integration/test/bootstrap/setup.sh
        test-dir: integration/test/bootstrap
        requires:
        - go-build-apptestctl
